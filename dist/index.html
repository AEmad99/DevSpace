<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DevSpace</title>
  <style>
    :root { color-scheme: dark; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      background: #282c34;
      color: #abb2bf;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      overflow: hidden;
      user-select: none;
    }
    .wrap {
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
    }
    .logo {
      width: 72px; height: 72px;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    .title { font-size: 22px; font-weight: 600; letter-spacing: 0.5px; color: #e6e6e6; }
    .status { font-size: 13px; color: #6b7280; min-height: 18px; }
    .spinner {
      width: 28px; height: 28px;
      border: 3px solid rgba(97,175,239,0.25);
      border-top-color: #61afef;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hint { position: fixed; bottom: 18px; font-size: 11px; color: #4b5563; }
  </style>
</head>
<body>
  <div class="wrap">
    <svg class="logo" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
      <path d="M11 7L5 16L11 25" fill="none" stroke="#61afef" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M21 7L27 16L21 25" fill="none" stroke="#61afef" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M16 11.5Q16 16 20.5 16Q16 16 16 20.5Q16 16 11.5 16Q16 16 16 11.5Z" fill="#61afef"/>
    </svg>
    <div class="title">DevSpace</div>
    <div class="spinner"></div>
    <div class="status" id="status">Starting local engine…</div>
  </div>
  <div class="hint">first launch can take a few seconds</div>
  <script>
    // The Rust host updates this via emitted events; harmless if it never fires.
    const el = document.getElementById('status');
    const msgs = ['Starting local engine…', 'Loading models & tools…', 'Warming up workspace…'];
    let i = 0;
    setInterval(() => { i = (i + 1) % msgs.length; if (el) el.textContent = msgs[i]; }, 2200);
    if (window.__TAURI__?.event) {
      window.__TAURI__.event.listen('backend-status', (e) => { if (el && e.payload) el.textContent = e.payload; });
    }
  </script>
</body>
</html>
